<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KDP AdCopy Generator</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#e47911" />
  <link rel="icon" href="/static/icons/icon-192.png" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">📚 KDP AdCopy</div>
      <nav>
        <a href="/admin" class="btn-nav">Admin</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <h1>Generate High-Converting <span class="accent">Amazon KDP</span> Ad Copy</h1>
      <p class="hero-sub">Powered by Groq AI — paste your product URL or fill in details manually.</p>
    </section>

    <!-- Input Form -->
    <section class="card form-card">
      <h2>Product Details</h2>
      <form id="generateForm">
        <div class="form-group">
          <label for="url">Amazon Product URL <span class="optional">(optional)</span></label>
          <input type="url" id="url" name="url" placeholder="https://amazon.com/dp/..." />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="title">Product Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. The Art of Journaling" />
          </div>
          <div class="form-group">
            <label for="target_audience">Target Audience</label>
            <input type="text" id="target_audience" name="target_audience" placeholder="e.g. busy moms, students" />
          </div>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3" placeholder="Briefly describe the book..."></textarea>
        </div>
        <div class="form-group">
          <label for="keywords">Keywords <span class="optional">(comma-separated)</span></label>
          <input type="text" id="keywords" name="keywords" placeholder="e.g. journal, self-care, mindfulness" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="platform">Platform</label>
            <select id="platform" name="platform">
              <option value="Amazon">Amazon</option>
              <option value="Facebook">Facebook</option>
              <option value="Instagram">Instagram</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tone">Tone</label>
            <select id="tone" name="tone">
              <option value="Emotional">Emotional</option>
              <option value="Professional">Professional</option>
              <option value="Urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="min_words">Min Words (short ads)</label>
            <input type="number" id="min_words" name="min_words" value="30" min="10" max="500" />
          </div>
          <div class="form-group">
            <label for="max_words">Max Words (short ads)</label>
            <input type="number" id="max_words" name="max_words" value="100" min="20" max="1000" />
          </div>
        </div>
        <button type="submit" class="btn-primary" id="generateBtn">
          <span id="btnText">✨ Generate Ad Copy</span>
          <span id="btnLoading" class="hidden">⏳ Generating...</span>
        </button>
      </form>
    </section>

    <!-- Error Banner -->
    <div id="errorBanner" class="error-banner hidden"></div>

    <!-- Results Section -->
    <section id="results" class="hidden">
      <!-- Product Info -->
      <div class="card product-card" id="productInfo"></div>

      <!-- Export Buttons -->
      <div class="export-bar">
        <button class="btn-export" id="exportHtml">⬇ Export HTML</button>
        <button class="btn-export" id="exportZip">📦 Export ZIP</button>
      </div>

      <!-- Ad Copy Sections -->
      <div class="card" id="headlinesSection">
        <h2>📢 Headlines</h2>
        <div id="headlines" class="items-list"></div>
      </div>

      <div class="card" id="hooksSection">
        <h2>🎣 Hooks</h2>
        <div id="hooks" class="items-list"></div>
      </div>

      <div class="card" id="shortAdsSection">
        <h2>⚡ Short Ads</h2>
        <div id="shortAds" class="items-list"></div>
      </div>

      <div class="card" id="longAdsSection">
        <h2>📝 Long Ads</h2>
        <div id="longAds" class="items-list long-ads-list"></div>
      </div>

      <div class="card" id="keywordsSection">
        <h2>🔑 Keywords</h2>
        <div id="keywords" class="keywords-cloud"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>KDP AdCopy Generator &mdash; Powered by Groq AI</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
